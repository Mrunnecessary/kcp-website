<!DOCTYPE html>
<html>
<head>
  <title>Order</title>
</head>

<body style="font-family: Arial; text-align:center;">

<h2>Place Order 🍫</h2>

<form id="orderForm">

<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="phone" placeholder="Phone" required>
<input type="text" name="altPhone" placeholder="Alternate Number">
<input type="text" name="city" placeholder="City">
<textarea name="address" placeholder="Full Address"></textarea>

<select name="product">
  <option value="Chocolate Bars">Chocolate Bars</option>
  <option value="Gift Box">Gift Box</option>
</select>

<input type="number" name="amount" placeholder="Amount">
<input type="text" name="referral" placeholder="Referral Code">

<p style="color:red;">
⚠ By placing order, you agree to our Terms & Conditions
</p>

<button type="submit">Submit Order</button>

</form>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e) {
  e.preventDefault();

  console.log("Form submitted ✅");

  const data = {
    name: document.querySelector("[name='name']").value,
    email: document.querySelector("[name='email']").value,
    phone: document.querySelector("[name='phone']").value,
    altPhone: document.querySelector("[name='altPhone']").value,
    city: document.querySelector("[name='city']").value,
    address: document.querySelector("[name='address']").value,
    product: document.querySelector("[name='product']").value,
    amount: document.querySelector("[name='amount']").value,
    referral: document.querySelector("[name='referral']").value
  };

  fetch("https://script.google.com/macros/s/AKfycbzFa8AOdDQ0k2T8hquX_a8tM3tSrH8vJyc63Qq_LaZdyB4Dz13t9O7dFJAbpl1xkfD2Ug/exec", {
    method: "POST",
    mode: "no-cors",   // ⭐ VERY IMPORTANT
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("Order placed successfully! 🎉 Check email for payment link.");

});
</script>

</body>
</html>
