<!DOCTYPE html>
<html>
<head>
  <title>Order</title>
</head>

<body style="font-family: Arial; text-align:center;">

<h2>Place Order 🍫</h2>

<form id="orderForm">

<input name="Name" placeholder="Name" required><br><br>
<input name="Email" placeholder="Email" required><br><br>
<input name="Phone" placeholder="Phone" required><br><br>
<input name="Alternate Number" placeholder="Alternate Number"><br><br>
<input name="City" placeholder="City" required><br><br>

<textarea name="Full Address" placeholder="Full Address" required></textarea><br><br>

<select name="Product">
<option>Chocolate Bars</option>
<option>Gift Box</option>
<option>Custom Order</option>
</select><br><br>

<input name="Amount" placeholder="Amount" required><br><br>

<input name="Referral Code" placeholder="Referral Code"><br><br>

<p style="color:red;">
⚠ By placing order, you agree to our Terms & Conditions
</p>

<button type="submit">Submit Order</button>

</form>

<script>
document.querySelector("form").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    name: document.querySelector("input[name='name']").value,
    email: document.querySelector("input[name='email']").value,
    phone: document.querySelector("input[name='phone']").value,
    altPhone: document.querySelector("input[name='altPhone']").value,
    city: document.querySelector("input[name='city']").value,
    address: document.querySelector("textarea[name='address']").value,
    product: document.querySelector("select[name='product']").value,
    amount: document.querySelector("input[name='amount']").value,
    referral: document.querySelector("input[name='referral']").value
  };

  fetch("https://script.google.com/macros/s/AKfycbzZ4WVcly57YDNQwDDjdK7R4zBvg0l6N4CShAgT-lyvDJKdCHVcps1E-aieFDQeLAt5cQ/exec", {
    method: "POST",
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "application/json"
    }
  })
  .then(res => res.json())
  .then(response => {
    if (response.status === "success") {
      alert("Order placed successfully! 🎉 Check email for payment link.");

      window.open("https://wa.me/917003143525?text=Hi%20I%20just%20placed%20an%20order", "_blank");
    } else {
      alert("Error submitting order");
    }
  })
  .catch(err => {
    console.error(err);
    alert("Submission failed. Please try again.");
  });
});

</body>
</html>
